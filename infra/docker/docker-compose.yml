version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cronus-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cronus
      POSTGRES_USER: cronus
      POSTGRES_PASSWORD: cronus_dev
    command: >
      -c shared_preload_libraries=
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cronus -d cronus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cronus-net

  redis:
    image: redis:7-alpine
    container_name: cronus-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cronus-net

  minio:
    image: minio/minio
    container_name: cronus-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - cronus-net

  temporal:
    image: temporalio/auto-setup:latest
    container_name: cronus-temporal
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres
      DB_PORT: "5432"
      POSTGRES_USER: cronus
      POSTGRES_PWD: cronus_dev
      POSTGRES_SEEDS: postgres
    networks:
      - cronus-net

  temporal-ui:
    image: temporalio/ui:latest
    container_name: cronus-temporal-ui
    ports:
      - "8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    networks:
      - cronus-net

  # ── App Services (bind-mount based, requires host pnpm install) ──────────
  api:
    image: node:26-slim
    container_name: cronus-api
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ../..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://cronus:cronus_dev@postgres:5432/cronus
      REDIS_URL: redis://redis:6379
      STORAGE_MODE: filesystem
      STORAGE_PATH: /tmp/cronus-assets
      API_PORT: "3000"
      API_HOST: 0.0.0.0
      LOG_LEVEL: debug
    command: >
      sh -c "npm install -g pnpm@9 && pnpm install && pnpm --filter @cronus/api run dev"

  worker:
    image: node:26-slim
    container_name: cronus-worker
    working_dir: /app
    volumes:
      - ../..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://cronus:cronus_dev@postgres:5432/cronus
      REDIS_URL: redis://redis:6379
      STORAGE_MODE: filesystem
      STORAGE_PATH: /tmp/cronus-assets
      LOG_LEVEL: debug
    command: >
      sh -c "npm install -g pnpm@9 && pnpm install && pnpm --filter @cronus/worker run dev"

  temporal-worker:
    image: node:26-slim
    container_name: cronus-temporal-worker
    working_dir: /app
    volumes:
      - ../..:/app
    depends_on:
      temporal:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://cronus:cronus_dev@postgres:5432/cronus
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      LOG_LEVEL: debug
    command: >
      sh -c "npm install -g pnpm@9 && pnpm install && pnpm --filter temporal-worker run dev"

networks:
  cronus-net:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
